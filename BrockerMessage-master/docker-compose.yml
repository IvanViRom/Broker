services:
  queue-manager:
    build: .
    container_name: queue-manager
    command: ["/app/queue-manager"]
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
    networks:
      - broker-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  broker:
    build: .
    container_name: broker
    command: ["/app/broker"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - QM_URL=http://queue-manager:8081
    depends_on:
      queue-manager:
        condition: service_healthy
    networks:
      - broker-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  client:
    build: .
    container_name: client
    command: ["/app/client"]
    depends_on:
      broker:
        condition: service_healthy
      queue-manager:
        condition: service_healthy
    environment:
      - BROKER_URL=http://broker:8080
      - QM_URL=http://queue-manager:8081
    networks:
      - broker-network

networks:
  broker-network:
    driver: bridge

volumes:
  data: